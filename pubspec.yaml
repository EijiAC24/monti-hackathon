name: monti
description: "AI companion for positive habit building in children - Hackathon Edition"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  web_socket_channel: ^3.0.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  record: ^6.2.0
  audioplayers: ^6.1.0
  flutter_pcm_sound: ^3.3.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
